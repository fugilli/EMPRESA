<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Empresa – Gestão de Empresa</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');})()</script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f0f2f5; font-family:system-ui,sans-serif; margin:0; }
    .topbar { background:#1a1a2e; color:#fff; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:52px; }
    .brand { font-weight:600; font-size:1rem; }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .badge-cal { background:#4f8ef7; color:#fff; border-radius:20px; padding:3px 12px; font-size:.8rem; }
    .btn-topbar { color:#fff; font-size:.78rem; border:1px solid rgba(255,255,255,.4); border-radius:5px; padding:4px 10px; text-decoration:none; cursor:pointer; background:none; }
    .btn-topbar:hover { background:rgba(255,255,255,.1); color:#fff; }
    .tabs { background:#fff; border-bottom:2px solid #e5e7eb; display:flex; padding:0 24px; }
    .tab { padding:12px 20px; font-size:.9rem; font-weight:500; color:#666; text-decoration:none; border-bottom:3px solid transparent; margin-bottom:-2px; transition:color .15s; }
    .tab:hover { color:#1a1a2e; }
    .tab.active { color:#1a1a2e; border-bottom-color:#4f8ef7; }

    .main { padding:28px 24px; max-width:760px; }

    .section-card { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.07); padding:24px 28px; margin-bottom:20px; }
    .section-title { font-size:.72rem; font-weight:700; color:#bbb; text-transform:uppercase; letter-spacing:.6px; margin-bottom:18px; }

    .fields-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px 28px; }
    .fields-grid.three-col { grid-template-columns:1fr 1fr 1fr; }
    .fields-grid.full { grid-template-columns:1fr; }

    .field-group { display:flex; flex-direction:column; gap:5px; }
    .field-label { font-size:.7rem; font-weight:700; color:#bbb; text-transform:uppercase; letter-spacing:.5px; }
    .field-input { border:1px solid #e0e0e0; border-radius:7px; padding:8px 12px; font-size:.95rem; outline:none; background:#fafafa; color:#1a1a2e; transition:border-color .15s, background .15s; }
    .field-input:hover { border-color:#c0c0c0; background:#fff; }
    .field-input:focus { border-color:#4f8ef7; background:#fff; box-shadow:0 0 0 2px rgba(79,142,247,.12); }
    .field-input.saved { border-color:#66bb6a; background:#f1f8f1; }

    .save-btn { margin-top:6px; background:#4f8ef7; color:#fff; border:none; border-radius:7px; padding:9px 22px; font-size:.9rem; font-weight:600; cursor:pointer; }
    .save-btn:hover { background:#3a7ae0; }
    .save-btn:disabled { opacity:.5; cursor:default; }

    .toast { position:fixed; bottom:24px; right:24px; background:#1a1a2e; color:#fff; padding:10px 18px; border-radius:8px; font-size:.85rem; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
    .toast.show { opacity:1; }

    .info-note { font-size:.78rem; color:#aaa; margin-top:8px; }

    /* ── dark mode ─────────────────────────────────────────────────────────── */
    html.dark body { background:#111318; color:#e0e6f0; }
    html.dark .tabs { background:#161921; border-bottom-color:#2a2d3e; }
    html.dark .tab { color:#8b9ab0; }
    html.dark .tab:hover { color:#e0e6f0; }
    html.dark .tab.active { color:#e0e6f0; }
    html.dark .section-card { background:#1e2130; box-shadow:0 2px 8px rgba(0,0,0,.4); }
    html.dark .section-title { color:#5a6478; }
    html.dark .field-label { color:#5a6478; }
    html.dark .field-input { background:#252838; border-color:#3a3d4e; color:#e0e6f0; }
    html.dark .field-input:hover { border-color:#5a6478; background:#2a2d3e; }
    html.dark .field-input:focus { background:#2a2d3e; border-color:#4f8ef7; }
    html.dark .field-input.saved { border-color:#66bb6a; background:#1a2a1a; }
    html.dark .info-note { color:#5a6478; }
  </style>
</head>
<body>
{% set active_tab = 'empresa' %}
{% include '_nav.html' %}

<div class="main">

  <div class="section-card">
    <div class="section-title">Identificação</div>
    <div class="fields-grid">
      <div class="field-group" style="grid-column:1/-1">
        <label class="field-label">Nome / Razão Social</label>
        <input class="field-input" id="f_nome" type="text" placeholder="Nome da empresa ou nome completo">
      </div>
      <div class="field-group">
        <label class="field-label">NIF</label>
        <input class="field-input" id="f_nif" type="text" placeholder="000000000" maxlength="9">
      </div>
      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" id="f_email" type="email" placeholder="email@exemplo.pt">
      </div>
      <div class="field-group">
        <label class="field-label">Telefone</label>
        <input class="field-input" id="f_telefone" type="text" placeholder="+351 000 000 000">
      </div>
      <div class="field-group">
        <label class="field-label">Site</label>
        <input class="field-input" id="f_site" type="text" placeholder="www.exemplo.pt">
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title">Morada</div>
    <div class="fields-grid">
      <div class="field-group" style="grid-column:1/-1">
        <label class="field-label">Morada</label>
        <input class="field-input" id="f_morada" type="text" placeholder="Rua, número, andar">
      </div>
      <div class="field-group">
        <label class="field-label">Código Postal</label>
        <input class="field-input" id="f_codigo_postal" type="text" placeholder="0000-000">
      </div>
      <div class="field-group">
        <label class="field-label">Localidade</label>
        <input class="field-input" id="f_localidade" type="text" placeholder="Cidade">
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title">Dados Bancários</div>
    <div class="fields-grid">
      <div class="field-group" style="grid-column:1/-1">
        <label class="field-label">IBAN</label>
        <input class="field-input" id="f_iban" type="text" placeholder="PT50 0000 0000 0000 0000 0000 0" style="font-family:monospace;letter-spacing:.5px">
      </div>
      <div class="field-group">
        <label class="field-label">BIC / SWIFT</label>
        <input class="field-input" id="f_bic" type="text" placeholder="AAAAPTPL" style="font-family:monospace">
      </div>
      <div class="field-group">
        <label class="field-label">Banco</label>
        <input class="field-input" id="f_banco" type="text" placeholder="Nome do banco">
      </div>
    </div>
    <p class="info-note">O IBAN aparece no rodapé dos CSV de faturação para referência de pagamento.</p>
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveAll()">Guardar</button>
</div>

<div class="toast" id="toast"></div>

<script>
const FIELDS = ['nome','nif','email','telefone','site','morada','codigo_postal','localidade','iban','bic','banco'];
const DATA = {{ empresa_json | safe }};

// preencher campos com dados guardados
FIELDS.forEach(k => {
  const el = document.getElementById('f_' + k);
  if (el && DATA[k]) el.value = DATA[k];
});

// marcar como saved ao modificar (reset visual)
FIELDS.forEach(k => {
  const el = document.getElementById('f_' + k);
  if (!el) return;
  el.addEventListener('input', () => el.classList.remove('saved'));
});

async function saveAll() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'A guardar…';

  const body = {};
  FIELDS.forEach(k => {
    const el = document.getElementById('f_' + k);
    if (el) body[k] = el.value.trim();
  });

  try {
    const res = await fetch('/api/empresa', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const d = await res.json();
    if (d.ok) {
      FIELDS.forEach(k => {
        const el = document.getElementById('f_' + k);
        if (el) el.classList.add('saved');
      });
      showToast('Dados guardados com sucesso.');
    } else {
      showToast('Erro ao guardar.');
    }
  } catch {
    showToast('Erro de ligação.');
  }

  btn.disabled = false;
  btn.textContent = 'Guardar';
}

// guardar também com Enter em qualquer campo
document.querySelectorAll('.field-input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') saveAll(); });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
