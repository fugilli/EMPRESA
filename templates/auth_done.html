<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Autenticado</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
    .msg { text-align: center; }
    h2 { color: #2e7d32; }
    p { color: #666; }
  </style>
</head>
<body>
<div class="msg">
{% if error %}
  <h2 style="color:#c62828">✗ Erro na autenticação</h2>
  <p>{{ error }}</p>
  <p style="margin-top:1em"><a href="http://127.0.0.1:8765/auth">Voltar à app para tentar novamente</a></p>
{% else %}
  <h2>✓ Autenticação concluída!</h2>
  <p>Podes fechar este separador e voltar à app.</p>
{% endif %}
</div>
</body>
</html>
